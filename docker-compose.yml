# mws-mtss-system — Local Development & Komodo Reference
# ──────────────────────────────────────────────────────────
# LOCAL DEV:  docker compose up --build
# KOMODO:     Uses image: tags (no build:) — images pulled from GHCR
#             Registry: ghcr.io/mws-mad-labs/
# ──────────────────────────────────────────────────────────

services:
  backend:
    image: ghcr.io/mws-mad-labs/mws-mtss-system-be:staging
    container_name: mws-mtss-system-be
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3004
    networks:
      - mtss-system-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/mws-mad-labs/mws-mtss-system-fe:staging
    container_name: mws-mtss-system-fe
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mtss-system-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  mtss-system-net:
    name: mws-mtss-system-net
    driver: bridge
