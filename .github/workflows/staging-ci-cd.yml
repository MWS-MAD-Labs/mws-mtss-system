name: MTSS System — Staging CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  BE_IMAGE: ${{ github.repository_owner }}/mws-mtss-system-be
  FE_IMAGE: ${{ github.repository_owner }}/mws-mtss-system-fe

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────
  # BACKEND: Quality Gate
  # ─────────────────────────────────────────
  test-be:
    name: BE Quality Gate
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install BE deps
        run: npm ci
        working-directory: backend

      - name: Lint BE
        run: |
          if npm run | grep -q "lint"; then npm run lint; else echo "No lint, skipping."; fi
        working-directory: backend

      - name: Unit tests BE
        run: |
          if npm run | grep -q "test:smoke"; then
            npm run test:smoke -- --testTimeout=60000
          elif npm run | grep -q " test"; then
            npm test -- --ci
          else
            echo "No test script, skipping."
          fi
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          MONGODB_URI: mongodb://localhost:27017/mws-mtss-system-test
          SLACK_BOT_TOKEN: ""
          SLACK_APP_TOKEN: ""
          GOOGLE_CLIENT_ID: dummy-client-id-for-ci
          GOOGLE_CLIENT_SECRET: dummy-client-secret-for-ci
          GOOGLE_REDIRECT_URL: http://localhost:3004/auth/google/callback
          GOOGLE_AI_API_KEY: dummy-api-key-for-ci
          AGENT_ROUTER_TOKEN: dummy-agent-router-token-for-ci

  # ─────────────────────────────────────────
  # FRONTEND: Quality Gate
  # ─────────────────────────────────────────
  test-fe:
    name: FE Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install FE deps
        run: npm ci
        working-directory: frontend

      - name: Lint FE
        run: |
          if npm run | grep -q " lint"; then npm run lint -- --quiet; else echo "No lint, skipping."; fi
        working-directory: frontend

      - name: Build FE
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE: /api/v1

  # ─────────────────────────────────────────
  # BUILD & PUSH — Backend Image
  # ─────────────────────────────────────────
  build-be:
    name: Build & Push BE Image
    runs-on: ubuntu-latest
    needs: [test-be]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — BE
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BE_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-
            type=raw,value=staging-${{ github.run_number }}

      - name: Build and push BE
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mtss-system-be
          cache-to: type=gha,mode=max,scope=mtss-system-be
          platforms: linux/amd64

      - name: Summary BE
        run: |
          echo "## 🐳 MTSS System — Backend Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # BUILD & PUSH — Frontend Image
  # ─────────────────────────────────────────
  build-fe:
    name: Build & Push FE Image
    runs-on: ubuntu-latest
    needs: [test-fe]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — FE
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FE_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-
            type=raw,value=staging-${{ github.run_number }}

      - name: Build and push FE
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mtss-system-fe
          cache-to: type=gha,mode=max,scope=mtss-system-fe
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE=/api/v1

      - name: Summary FE
        run: |
          echo "## 🐳 MTSS System — Frontend Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # DEPLOY — Trigger Komodo Stack Redeploy
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Komodo (Staging)
    runs-on: ubuntu-latest
    needs: [build-be, build-fe]
    if: |
      always() &&
      needs.build-be.result == 'success' &&
      needs.build-fe.result == 'success'
    steps:
      - name: Trigger Komodo — mws-mtss-system stack
        run: |
          BODY='{"ref":"refs/heads/main","repository":{"name":"mws-mtss-system"},"tag":"staging"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.KOMODO_WEBHOOK_SECRET }}" | awk '{print "sha256="$2}')
          HTTP_STATUS=$(curl -s -o /tmp/komodo_resp.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY" \
            "${{ secrets.KOMODO_WEBHOOK_URL }}")
          echo "Komodo response [HTTP $HTTP_STATUS]:"
          cat /tmp/komodo_resp.txt
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] || exit 1

      - name: Deployment summary
        run: |
          echo "## 🚀 MTSS System Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **BE image:** \`ghcr.io/${{ env.BE_IMAGE }}:staging-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **FE image:** \`ghcr.io/${{ env.FE_IMAGE }}:staging-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Komodo stack:** \`mws-mtss-system\`" >> $GITHUB_STEP_SUMMARY
