name: MTSS System - Production CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  BE_IMAGE: ${{ github.repository_owner }}/mws-mtss-system-be
  FE_IMAGE: ${{ github.repository_owner }}/mws-mtss-system-fe

permissions:
  contents: read
  packages: write

jobs:
  test-be:
    name: BE Quality Gate
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install BE deps
        run: npm ci
        working-directory: backend

      - name: Lint BE (advisory)
        continue-on-error: true
        run: |
          if npm run | grep -q "lint"; then npm run lint; else echo "No lint, skipping."; fi
        working-directory: backend

      - name: Unit tests BE
        run: |
          if npm run | grep -q "test:smoke"; then
            npm run test:smoke -- --testTimeout=60000
          elif npm run | grep -q " test"; then
            npm test -- --ci
          else
            echo "No test script, skipping."
          fi
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          MONGODB_URI: mongodb://localhost:27017/mws-mtss-system-test
          SLACK_BOT_TOKEN: ""
          SLACK_APP_TOKEN: ""
          GOOGLE_CLIENT_ID: dummy-client-id-for-ci
          GOOGLE_CLIENT_SECRET: dummy-client-secret-for-ci
          GOOGLE_REDIRECT_URL: http://localhost:3004/auth/google/callback
          GOOGLE_AI_API_KEY: dummy-api-key-for-ci
          AGENT_ROUTER_TOKEN: dummy-agent-router-token-for-ci

  test-fe:
    name: FE Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install FE deps
        run: npm ci
        working-directory: frontend

      - name: Lint FE (advisory)
        continue-on-error: true
        run: |
          if npm run | grep -q " lint"; then npm run lint -- --quiet; else echo "No lint, skipping."; fi
        working-directory: frontend

      - name: Build FE
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE: /mtss/api/v1
          VITE_BASE_PATH: /mtss/

  build-be:
    name: Build & Push BE Image
    runs-on: ubuntu-latest
    needs: [test-be]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata - BE
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BE_IMAGE }}
          tags: |
            type=raw,value=production
            type=sha,prefix=production-
            type=raw,value=production-${{ github.run_number }}

      - name: Build and push BE
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mtss-system-be-production
          cache-to: type=gha,mode=max,scope=mtss-system-be-production
          platforms: linux/amd64

      - name: Summary BE
        run: |
          echo "## MTSS System - Backend Production Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  build-fe:
    name: Build & Push FE Image
    runs-on: ubuntu-latest
    needs: [test-fe]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata - FE
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FE_IMAGE }}
          tags: |
            type=raw,value=production
            type=sha,prefix=production-
            type=raw,value=production-${{ github.run_number }}

      - name: Build and push FE
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mtss-system-fe-production
          cache-to: type=gha,mode=max,scope=mtss-system-fe-production
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE=/mtss/api/v1
            VITE_BASE_PATH=/mtss/

      - name: Summary FE
        run: |
          echo "## MTSS System - Frontend Production Image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Komodo (Production)
    runs-on: ubuntu-latest
    needs: [build-be, build-fe]
    if: |
      always() &&
      needs.build-be.result == 'success' &&
      needs.build-fe.result == 'success'
    steps:
      - name: Trigger Komodo - mws-mtss-system production stack
        id: deploy_komodo
        env:
          KOMODO_WEBHOOK_URL: ${{ secrets.KOMODO_PRODUCTION_WEBHOOK_URL }}
          KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_PRODUCTION_WEBHOOK_SECRET }}
        run: |
          if [ -z "$KOMODO_WEBHOOK_URL" ] || [ -z "$KOMODO_WEBHOOK_SECRET" ]; then
            echo "Production Komodo webhook secrets are not configured yet; skipping production redeploy."
            echo "Set KOMODO_PRODUCTION_WEBHOOK_URL and KOMODO_PRODUCTION_WEBHOOK_SECRET after the production stack exists."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            echo "## MTSS System Production Deploy" >> "$GITHUB_STEP_SUMMARY"
            echo "Production images can be built, but the Komodo redeploy was skipped because production webhook secrets are not configured yet." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BODY='{"ref":"refs/heads/main","repository":{"name":"mws-mtss-system"},"tag":"production","environment":"production"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          HTTP_STATUS=$(curl -s -o /tmp/komodo_resp.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY" \
            "$KOMODO_WEBHOOK_URL")
          echo "Komodo response [HTTP $HTTP_STATUS]:"
          cat /tmp/komodo_resp.txt
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] || exit 1
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        if: steps.deploy_komodo.outputs.deployed == 'true'
        run: |
          echo "## MTSS System Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://app.millenniaws.sch.id/mtss/" >> $GITHUB_STEP_SUMMARY
          echo "- **BE image:** \`ghcr.io/${{ env.BE_IMAGE }}:production-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **FE image:** \`ghcr.io/${{ env.FE_IMAGE }}:production-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Komodo stack:** \`mws-mtss-system-production\`" >> $GITHUB_STEP_SUMMARY
