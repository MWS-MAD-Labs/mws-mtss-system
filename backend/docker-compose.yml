services:
  backend:
    image: ghcr.io/netslayer67/mws-app-be:latest
    container_name: mws-backend
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      FRONTEND_URL: https://app.millenniaws.sch.id
      CORS_ORIGINS: https://app.millenniaws.sch.id,http://localhost:5173
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      SESSION_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: https://app.millenniaws.sch.id/auth/google/callback
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      GOOGLE_AI_MODEL: gemini-flash-latest
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_MODEL: arcee-ai/trinity-large-preview:free
      OPENROUTER_FALLBACK_MODELS: ""
      OPENROUTER_MAX_TOKENS: "1024"
      OPENROUTER_TEMPERATURE: "0.4"
      OPENROUTER_MIN_DELAY_MS: "600"
      OPENROUTER_HTTP_REFERER: https://app.millenniaws.sch.id
      OPENROUTER_APP_NAME: IntegraLearn AI Chat
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      RATE_LIMIT_WINDOW: "15"
      RATE_LIMIT_MAX_REQUESTS: "600"
      CACHE_TTL: "3600"
      LOG_LEVEL: info
      CLOUDINARY_CLOUD_NAME: deldcwiji
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mws-network

  frontend:
    image: ghcr.io/netslayer67/mws-app-fe:latest
    container_name: mws-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3003:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mws-network

networks:
  mws-network:
    driver: bridge