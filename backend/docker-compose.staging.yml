services:
  backend:
    image: ghcr.io/netslayer67/mws-app-be:staging-latest
    container_name: mws-backend-staging
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      FRONTEND_URL: https://app-stg.mws.web.id
      CORS_ORIGINS: https://app-stg.mws.web.id
      OPENROUTER_APP_NAME: IntegraLearn AI Chat Staging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mws-network

  frontend:
    image: ghcr.io/netslayer67/mws-app-fe:staging-latest
    container_name: mws-frontend-staging
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4177:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mws-network

networks:
  mws-network:
    driver: bridge
