# MTSS FE — served under /mtss/ (path-based "one app" gateway).
# The build is COPIED into /usr/share/nginx/html/mtss (see Dockerfile), so all
# /mtss/* paths match naturally without alias/rewrite. API/auth/socket are
# proxied to the backend with the /mtss prefix STRIPPED (the backend still
# receives /api, /auth, etc.).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Evidence uploads (5 files x 5MB) + multipart overhead
    client_max_body_size 30m;

    # Container-level health check (outside /mtss)
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Direct hits to root → send to /mtss/
    location = / {
        return 302 /mtss/;
    }

    # ── API → backend (strip /mtss) ────────────────────────────────────
    # /mtss/api/v1/x  →  backend:3004/api/v1/x
    location /mtss/api/ {
        proxy_pass http://backend:3004/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The OAuth callback is an SPA route (MUST come before /mtss/auth/)
    location = /mtss/auth/callback {
        try_files /mtss/index.html =404;
    }

    # ── Google OAuth → backend (strip /mtss) ───────────────────────────
    # /mtss/auth/google → backend:3004/auth/google
    location /mtss/auth/ {
        proxy_pass http://backend:3004/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Socket.io (WebSocket) → backend (strip /mtss) ──────────────────
    location /mtss/socket.io/ {
        proxy_pass http://backend:3004/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker — never cache (the browser must always fetch the latest)
    location ~ ^/mtss/(sw\.js|mws-sw\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Asset cache (hashed filenames, immutable)
    location /mtss/assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── SPA routing under /mtss/ ───────────────────────────────────────
    location /mtss/ {
        try_files $uri $uri/ /mtss/index.html;
    }
}
